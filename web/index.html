<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抖音直播互动</title>
    <link rel="stylesheet" href="/src/style.css" />

  <body>
    <main class="page">
      <h1>抖音直播互动</h1>
      <p class="desc">前端页面由 Vite 构建，视频资源放在项目根目录 <code>assets/videos/</code></p>

        <a class="card" href="/video?dir=boy">
          <strong>男生视频循环</strong>

        </a>
        <a class="card" href="/gifts">
          <strong>礼物监控面板</strong>
          <span>实时 SSE 礼物列表（由 Go 服务提供）</span>

    <script type="module" src="/src/main.ts"></script>
